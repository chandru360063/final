name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install pillow

    - name: Show files
      run: dir project

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --add-data "project/logo.png;." project/app.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: my-app
        path: dist/*.exe
